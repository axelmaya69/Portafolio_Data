<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Certificaciones AWS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .pdf {
            width: 100%;
            margin-bottom: 40px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
            overflow: hidden;
        }

        .pdf h2 {
            padding: 15px;
            text-align: center;
            background: #232f3e;
            color: white;
            font-size: 18px;
        }

        iframe {
            display: block;
            width: 100%;
            height: 1000px;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Visualizador de Certificaciones AWS</h1>

    <div class="pdf">
        <h2>Data Engineering on AWS</h2>
        <iframe src="Certificación Data Engineering on AWS.pdf"></iframe>
    </div>

    <div class="pdf">
        <h2>Getting into the Serverless Mindset</h2>
        <iframe src="Certificación Getting into the Serverless Mindset.pdf"></iframe>
    </div>

    
    <div class="pdf">
        <h2>Certificacion AWS Well-Architected Foundations</h2>
        <iframe src="Certificacion AWS Well-Architected.pdf"></iframe>
    </div>

    
    <div class="pdf">
        <h2>Certificación AWS Cloud Practitioner Essentials</h2>
        <iframe src="Certificación AWS Cloud Practitioner Essentials.pdf"></iframe>
    </div>
</body>
</html>
